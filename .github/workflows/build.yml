name: Build extension artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge, firefox]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: ver
        run: |
          VERSION=$(jq -r .version ${{ matrix.browser }}/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          cd ${{ matrix.browser }}
          zip -r "../web-design-ruler-${{ steps.ver.outputs.version }}-${{ matrix.browser }}.zip" \
            . -x "*.DS_Store" "*.swp"
          cd ..
          ls -la web-design-ruler-*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-design-ruler-${{ matrix.browser }}-${{ steps.ver.outputs.version }}
          path: web-design-ruler-${{ steps.ver.outputs.version }}-${{ matrix.browser }}.zip
          retention-days: 90

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: web-design-ruler-${{ steps.ver.outputs.version }}-${{ matrix.browser }}.zip
          fail_on_unmatched_files: true
