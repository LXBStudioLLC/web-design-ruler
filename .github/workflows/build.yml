name: Build extension artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge, firefox]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: ver
        run: |
          VERSION=$(jq -r .version ${{ matrix.browser }}/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [[ "$GITHUB_REF_NAME" != "v${{ steps.ver.outputs.version }}" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match ${{ matrix.browser }} manifest version ${{ steps.ver.outputs.version }} — bump the manifest(s) or retag."
            exit 1
          fi

      - name: Build zip
        run: |
          cd ${{ matrix.browser }}
          zip -r "../web-design-ruler-${{ steps.ver.outputs.version }}-${{ matrix.browser }}.zip" \
            . -x "*.DS_Store" "*.swp"
          cd ..
          ls -la web-design-ruler-*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-design-ruler-${{ matrix.browser }}-${{ steps.ver.outputs.version }}
          path: web-design-ruler-${{ steps.ver.outputs.version }}-${{ matrix.browser }}.zip
          retention-days: 90

  release:
    name: Attach zips to release
    # Exactly one job creates/updates the tag release: the three matrix jobs
    # each running action-gh-release raced to create it, intermittently
    # leaving the release with only one or two of the three zips.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: web-design-ruler-*
          merge-multiple: true

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: web-design-ruler-*.zip
          fail_on_unmatched_files: true
